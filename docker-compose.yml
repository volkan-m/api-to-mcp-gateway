services:
  postgres:
    image: postgres:16-alpine
    container_name: mcp-gateway-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcp_gateway
    ports:
      - "5432:5432"
    volumes:
      - mcp_gateway_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp_gateway"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mcp_gateway_pgdata:
